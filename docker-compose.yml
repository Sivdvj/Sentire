services:
    mongodb:
        image: mongo:7
        container_name: mongodb
        volumes:
            - mongo_data:/data/db
        networks:
            - sentire-internal
        restart: unless-stopped

    postgres:
        image: postgres:17
        container_name: postgres
        environment:
            POSTGRES_USER: postgres
            POSTGRES_PASSWORD: postgres
            POSTGRES_DB: postgres
        volumes:
            - pg_data:/var/lib/postgresql
        networks:
            - sentire-internal
        restart: unless-stopped

    neo4j:
        image: neo4j:5.25-community
        container_name: neo4j
        environment:
            - NEO4J_server_memory_heap_initial__size=256m
            - NEO4J_server_memory_heap_max__size=256m
            - NEO4J_AUTH=neo4j/${NEO4J_PASSWORD}
        volumes:
            - neo4j_data:/data
            - neo4j_logs:/logs
        networks:
            - sentire-internal
        restart: unless-stopped

    backend:
        build: ./backend
        container_name: sentire-backend
        env_file:
            - ./backend/.env
        depends_on:
            - mongodb
            - postgres
            - neo4j
        networks:
            - sentire-internal
        restart: unless-stopped

    frontend:
        build: ./frontend
        container_name: sentire-frontend
        depends_on:
            - backend
        networks:
            - traefik-net
            - sentire-internal
        labels:
            - "traefik.enable=true"
            - "traefik.http.routers.sentire.rule=Host(`sentire.sivv.me`)"
            - "traefik.http.routers.sentire.entrypoints=websecure"
            - "traefik.http.routers.sentire.tls.certresolver=letsencrypt"
            - "traefik.http.services.sentire.loadbalancer.server.port=80"
            - "traefik.docker.network=traefik-net"
        restart: unless-stopped

networks:
    traefik-net:
        external: true
    sentire-internal:
        driver: bridge

volumes:
    mongo_data:
    pg_data:
    neo4j_data:
    neo4j_logs:
